services:
  - type: web
    name: ai-reel-agent
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set the following secrets in the Render dashboard:
      # DASHBOARD_USERNAME, DASHBOARD_PASSWORD, JWT_SECRET
      # INSTAGRAM_ACCESS_TOKEN, INSTAGRAM_USER_ID
      # GEMINI_API_KEY, HEYGEN_API_KEY
      # WEBHOOK_SECRET
