<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Reel Agent – Dashboard Access</title>
  <style>
    :root {
      --bg: #090d18;
      --bg2: #101829;
      --text: #f3f7ff;
      --muted: #9fb0cc;
      --accent: #2dd4bf;
      --accent2: #60a5fa;
      --danger: #f87171;
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 0% 0%, rgba(96,165,250,0.18), transparent 45%),
        radial-gradient(900px 500px at 100% 100%, rgba(45,212,191,0.15), transparent 45%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .panel {
      width: min(420px, 100%);
      background: rgba(20,31,53,0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 28px 70px rgba(0,0,0,0.45);
    }
    .logo { font-size: 2rem; margin-bottom: 4px; }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p.sub { margin: 0 0 18px; color: var(--muted); font-size: 0.93rem; }
    label { display: block; margin: 14px 0 6px; font-size: 0.88rem; color: var(--muted); letter-spacing: 0.03em; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      background: #0d1527;
      outline: none;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent2); }
    button[type="submit"] {
      width: 100%;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.97rem;
      font-weight: 700;
      color: #05232b;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 10px; min-height: 20px; font-size: 0.88rem; color: var(--danger); }
    .links { margin-top: 16px; text-align: center; font-size: 0.88rem; }
    .links a { color: var(--accent2); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <form class="panel" id="login-form" autocomplete="off">
    <div class="logo">🤖</div>
    <h1>Dashboard Access</h1>
    <p class="sub">Sign in to view analytics and manage your AI Reel Agent.</p>

    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />

    <button type="submit" id="submit-btn">Sign In</button>
    <div class="msg" id="msg"></div>
    <div class="links"><a href="microsite.html">← Back to microsite</a></div>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/dashboard/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = '/dashboard/';
        } else {
          msg.textContent = data.message || 'Invalid credentials.';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (err) {
        msg.textContent = 'Network error – please try again.';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
