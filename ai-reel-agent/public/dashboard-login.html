<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Reel Agent - Opening Dashboard</title>
  <style>
    :root {
      --bg: #090d18;
      --bg2: #101829;
      --text: #f3f7ff;
      --muted: #9fb0cc;
      --accent: #2dd4bf;
      --accent2: #60a5fa;
      --danger: #f87171;
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 0% 0%, rgba(96,165,250,0.18), transparent 45%),
        radial-gradient(900px 500px at 100% 100%, rgba(45,212,191,0.15), transparent 45%),
        linear-gradient(160deg, var(--bg), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .panel {
      width: min(420px, 100%);
      background: rgba(20,31,53,0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 28px 70px rgba(0,0,0,0.45);
    }
    .logo { font-size: 2rem; margin-bottom: 4px; }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p.sub { margin: 0 0 18px; color: var(--muted); font-size: 0.93rem; }
    label { display: block; margin: 14px 0 6px; font-size: 0.88rem; color: var(--muted); letter-spacing: 0.03em; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      background: #0d1527;
      outline: none;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent2); }
    button[type="submit"] {
      width: 100%;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.97rem;
      font-weight: 700;
      color: #05232b;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 10px; min-height: 20px; font-size: 0.88rem; color: var(--danger); }
    .links { margin-top: 16px; text-align: center; font-size: 0.88rem; }
    .links a { color: var(--accent2); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="logo">🤖</div>
    <h1>Opening Dashboard</h1>
    <p class="sub">This setup is now local-only and no longer requires login.</p>
    <button type="button" id="open-btn">Open Dashboard</button>
    <div class="msg" id="msg"></div>
    <div class="links"><a href="/microsite.html">← Back to microsite</a></div>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const btn = document.getElementById('open-btn');

    btn.addEventListener('click', () => {
      window.location.href = 'dashboard.html';
    });

    msg.textContent = 'Redirecting...';
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 350);
  </script>
</body>
</html>
