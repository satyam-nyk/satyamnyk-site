name: Daily AI Reel Generation

on:
  schedule:
    # Run every day at 8 AM UTC (3 AM EST / 12 AM PST)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  generate-daily-reel:
    runs-on: ubuntu-latest
    name: Generate and Post Daily Reel
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Log trigger information
        run: |
          echo "Job triggered at: ${{ steps.date.outputs.date }}"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"

      - name: Trigger Daily Reel Generation Webhook
        id: webhook
        run: |
          echo "Sending webhook request to trigger daily reel generation..."
          BASE_URL="${{ secrets.WEBHOOK_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            echo "WEBHOOK_BASE_URL secret is missing"
            exit 1
          fi
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions" \
            "${BASE_URL}/generate-daily-reel")
          
          # Extract status code (last line)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          # Extract response body (all but last line)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          # Check if request was successful
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "error=true" >> $GITHUB_OUTPUT
            echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "error=false" >> $GITHUB_OUTPUT
          echo "status_code=$HTTP_CODE" >> $GITHUB_OUTPUT

      - name: Success - Reel Generated
        if: success()
        run: |
          echo "✅ Daily reel generation completed successfully!"
          echo "Timestamp: ${{ steps.date.outputs.date }}"
          echo "HTTP Status: ${{ steps.webhook.outputs.status_code }}"

      - name: Handle Failure
        if: failure()
        run: |
          echo "❌ Daily reel generation failed!"
          echo "HTTP Status: ${{ steps.webhook.outputs.status_code }}"
          exit 1

      - name: Send Failure Notification
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Daily reel generation job failed at ${{ steps.date.outputs.date }}\nHTTP Status: ${{ steps.webhook.outputs.status_code }}'
            }).catch(err => console.log('Could not post comment'));

      - name: Log Final Status
        if: always()
        run: |
          echo "Job exit code: $?"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

  weekly-batch:
    runs-on: ubuntu-latest
    name: Weekly Batch Processing (Sunday)
    if: github.event_name == 'schedule'
    
    steps:
      - name: Check if Sunday
        id: check_day
        run: |
          DAY_OF_WEEK=$(date -u +%w)
          IS_SUNDAY=$((DAY_OF_WEEK == 0 ? 1 : 0))
          echo "is_sunday=$IS_SUNDAY" >> $GITHUB_OUTPUT
          echo "day=$DAY_OF_WEEK" >> $GITHUB_OUTPUT
          if [ $IS_SUNDAY -eq 1 ]; then
            echo "✅ Today is Sunday, running batch processing..."
          else
            echo "ℹ️ Not Sunday, skipping batch processing (day=$DAY_OF_WEEK)"
          fi

      - name: Trigger Weekly Batch Processing
        if: steps.check_day.outputs.is_sunday == '1'
        run: |
          echo "Sending batch processing webhook..."
          BASE_URL="${{ secrets.WEBHOOK_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            echo "WEBHOOK_BASE_URL secret is missing"
            exit 1
          fi
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions" \
            "${BASE_URL}/batch-process")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "⚠️ Batch processing returned status $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Weekly batch processing completed!"

      - name: Skipped - Not Sunday
        if: steps.check_day.outputs.is_sunday != '1'
        run: echo "Batch processing only runs on Sundays"
