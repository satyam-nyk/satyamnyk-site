<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#05070c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5cc8ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Accent circles -->
  <circle cx="1000" cy="100" r="300" fill="#5cc8ff" opacity="0.08"/>
  <circle cx="100" cy="550" r="250" fill="#7c3aed" opacity="0.06"/>
  
  <!-- Left content area -->
  <g>
    <!-- Main title -->
    <text x="60" y="180" font-family="Sora, sans-serif" font-size="72" font-weight="900" fill="url(#nameGradient)" letter-spacing="-1">
      Satyam Nayak
    </text>
    
    <!-- Role -->
    <text x="60" y="270" font-family="Sora, sans-serif" font-size="42" font-weight="700" fill="#5cc8ff" letter-spacing="1">
      Technical Product Manager
    </text>
    
    <!-- Description -->
    <text x="60" y="340" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.8)" letter-spacing="-0.5">
      Design & Scale Platform Products
    </text>
    
    <text x="60" y="380" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.8)" letter-spacing="-0.5">
      AI Systems • Integration Workflows
    </text>
    
    <!-- Stats -->
    <g>
      <text x="60" y="480" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.6)">
        5+ Years Experience • Startup Founder • Metrics-Driven
      </text>
    </g>
  </g>
  
  <!-- Right visual accent -->
  <g opacity="0.15">
    <rect x="750" y="80" width="400" height="500" rx="20" fill="none" stroke="#5cc8ff" stroke-width="2"/>
    <rect x="800" y="150" width="300" height="350" rx="16" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  
  <!-- URL at bottom -->
  <text x="60" y="600" font-family="Plus Jakarta Sans, sans-serif" font-size="18" font-weight="500" fill="rgba(92,200,255,0.8)">
    satyamnyk.com
  </text>
</svg>