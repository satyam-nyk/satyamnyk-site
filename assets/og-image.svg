<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 90px; font-weight: 900; fill: #5cc8ff; }
      .role { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 50px; font-weight: 700; fill: #5cc8ff; }
      .desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 32px; font-weight: 500; fill: #c8c8c8; }
      .url { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 24px; font-weight: 500; fill: #64b4ff; }
    </style>
  </defs>
  
  <!-- Dark gradient-like background using solid color -->
  <rect width="1200" height="630" fill="#0a0e1a"/>
  
  <!-- Subtle accent shapes -->
  <circle cx="1050" cy="100" r="280" fill="#5cc8ff" opacity="0.08"/>
  <circle cx="80" cy="550" r="220" fill="#7c3aed" opacity="0.06"/>
  
  <!-- Content -->
  <text x="60" y="160" class="title">Satyam Nayak</text>
  <text x="60" y="250" class="role">Technical Product Manager</text>
  
  <text x="60" y="320" class="desc">Design &amp; Scale Platform Products</text>
  <text x="60" y="370" class="desc">AI Systems • Integration Workflows</text>
  
  <text x="60" y="480" class="desc">5+ Years • Startup Founder</text>
  
  <!-- URL -->
  <text x="60" y="580" class="url">satyamnyk.com</text>
  
  <!-- Subtle accent border -->
  <rect x="900" y="80" width="250" height="470" fill="none" stroke="#5cc8ff" stroke-width="2" opacity="0.4"/>
</svg>